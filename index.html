<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Sessions</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #7d8590;
      --cyan: #58a6ff;
      --blue: #388bfd;
      --yellow: #d29922;
      --green: #3fb950;
      --orange: #db6d28;
      --red: #f85149;
      --purple: #a371f7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 .icon { color: var(--cyan); }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .controls button, .refresh-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.15s;
    }

    .controls button:hover, .refresh-btn:hover { color: var(--text); border-color: var(--text-dim); }
    .controls button.active { color: var(--cyan); border-color: var(--cyan); background: rgba(88,166,255,0.1); }
    .refresh-btn { color: var(--green); }
    .refresh-btn:hover { border-color: var(--green); }
    .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      min-width: 140px;
    }

    .stat .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .stat .value.cyan { color: var(--cyan); }
    .stat .value.green { color: var(--green); }
    .stat .value.yellow { color: var(--yellow); }
    .stat .value.purple { color: var(--purple); }

    .search-bar {
      margin-bottom: 20px;
    }

    .search-bar input {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }

    .search-bar input:focus { border-color: var(--cyan); }
    .search-bar input::placeholder { color: var(--text-dim); }

    .day-group { margin-bottom: 24px; }

    .day-header {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .day-header .count {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 11px;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .session {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      transition: all 0.15s;
      cursor: pointer;
    }

    .session:hover { border-color: var(--text-dim); }
    .session.deleting { opacity: 0.4; transform: scale(0.98); }

    .session-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .session-prompt {
      font-size: 13px;
      color: var(--text);
    }

    .session-meta {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--text-dim);
      align-items: center;
    }

    .session-meta .project { color: var(--cyan); font-weight: 500; }
    .session-meta .time { color: var(--text-dim); }
    .session-meta .duration { color: var(--yellow); }
    .session-meta .msgs { color: var(--green); }

    .session-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .duration-bar {
      width: 60px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .duration-bar .fill {
      height: 100%;
      border-radius: 2px;
      background: var(--cyan);
    }

    .session-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .session:hover .session-actions { opacity: 1; }

    .action-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .action-btn.resume:hover { color: var(--green); border-color: var(--green); background: rgba(63,185,80,0.1); }
    .action-btn.resume.copied { opacity: 1; color: var(--green); border-color: var(--green); background: rgba(63,185,80,0.15); }
    .action-btn.delete:hover { color: var(--red); border-color: var(--red); background: rgba(248,81,73,0.1); }

    .action-btn.delete.confirm {
      opacity: 1;
      color: var(--red);
      border-color: var(--red);
      background: rgba(248,81,73,0.15);
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-dim);
      font-size: 14px;
    }

    .loading-state {
      text-align: center;
      padding: 48px;
      color: var(--text-dim);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .heatmap { margin-bottom: 24px; }
    .heatmap-title { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }

    .heatmap-grid {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .heatmap-cell {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .heatmap-cell.l1 { background: rgba(88,166,255,0.2); border-color: rgba(88,166,255,0.3); }
    .heatmap-cell.l2 { background: rgba(88,166,255,0.4); border-color: rgba(88,166,255,0.5); }
    .heatmap-cell.l3 { background: rgba(88,166,255,0.6); border-color: rgba(88,166,255,0.7); }
    .heatmap-cell.l4 { background: rgba(88,166,255,0.85); border-color: var(--cyan); }
    .heatmap-cell[title] { cursor: help; }

    /* ── Detail view ── */

    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .detail-overlay.show { opacity: 1; pointer-events: all; }

    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: min(720px, 85vw);
      height: 100vh;
      background: var(--bg);
      border-left: 1px solid var(--border);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }

    .detail-panel.show { transform: translateX(0); }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .detail-header .back-btn, .detail-header .resume-detail-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }

    .detail-header .back-btn:hover { color: var(--text); border-color: var(--text-dim); }
    .detail-header .resume-detail-btn { color: var(--green); border-color: var(--green); }
    .detail-header .resume-detail-btn:hover { background: rgba(63,185,80,0.1); }

    .detail-info {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 12px;
      color: var(--text-dim);
    }

    .detail-info .project { color: var(--cyan); font-weight: 500; }

    .detail-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg .msg-text {
      white-space: pre-wrap;
    }

    .msg.user {
      background: rgba(88,166,255,0.08);
      border-left: 3px solid var(--cyan);
    }

    .msg.assistant {
      background: var(--surface);
      border-left: 3px solid var(--green);
    }

    .msg .msg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .msg .msg-role {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .msg.user .msg-role { color: var(--cyan); }
    .msg.assistant .msg-role { color: var(--green); }

    .msg .msg-time {
      font-size: 10px;
      color: var(--text-dim);
    }

    .msg .tool-calls {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }

    .msg .tool-call {
      display: inline-block;
      background: rgba(163,113,247,0.1);
      border: 1px solid rgba(163,113,247,0.2);
      color: var(--purple);
      padding: 1px 6px;
      border-radius: 4px;
      margin: 2px 4px 2px 0;
      font-size: 10px;
    }

    .detail-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      color: var(--text-dim);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-color: var(--red); color: var(--red); }

    /* ── Rename UI ── */

    .session-prompt {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .session-prompt .prompt-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .edit-name-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .session:hover .edit-name-btn,
    .detail-title:hover .edit-name-btn { opacity: 0.6; }
    .edit-name-btn:hover { opacity: 1 !important; color: var(--cyan); }

    .rename-input {
      background: var(--bg);
      border: 1px solid var(--cyan);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 2px 8px;
      border-radius: 4px;
      outline: none;
      width: 100%;
    }

    .detail-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      min-width: 0;
      flex: 1;
      margin: 0 12px;
    }

    .detail-title .prompt-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-title .edit-name-btn { opacity: 0.6; }

    .custom-name-label {
      color: var(--cyan);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="icon">&#xf0320;</span> Claude Sessions</h1>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" onclick="loadSessions()">Refresh</button>
      <div class="controls">
        <button class="active" data-range="week">Week</button>
        <button data-range="month">Month</button>
        <button data-range="all">All</button>
      </div>
    </div>
  </div>

  <div class="stats-bar" id="stats"></div>
  <div class="heatmap" id="heatmap"></div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search sessions..." />
  </div>

  <div id="content">
    <div class="loading-state"><div class="spinner"></div><div>Loading sessions...</div></div>
  </div>

  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">Back</button>
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-info" id="detailInfo"></div>
      <button class="resume-detail-btn" id="resumeDetailBtn">Resume</button>
    </div>
    <div class="detail-messages" id="detailMessages">
      <div class="detail-loading"><div class="spinner"></div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = window.location.origin;
    let sessions = [];
    let currentRange = 'week';
    let searchQuery = '';
    let pendingConfirm = null;

    // ── Data loading ──

    async function loadSessions() {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('loading');
      btn.textContent = '...';
      try {
        const res = await fetch(`${API}/api/sessions`);
        if (!res.ok) throw new Error('Failed to fetch');
        sessions = await res.json();
        render();
      } catch (err) {
        // Fallback: try sessions.json for static mode
        try {
          const res = await fetch('sessions.json');
          sessions = await res.json();
          render();
        } catch {
          document.getElementById('content').innerHTML =
            '<div class="empty-state">Could not load sessions. Run <code>node server.js</code></div>';
        }
      } finally {
        btn.classList.remove('loading');
        btn.textContent = 'Refresh';
      }
    }

    // ── Delete session ──

    async function deleteSession(project, id, el) {
      // Two-click confirm
      if (pendingConfirm !== id) {
        // Reset any previous confirm
        document.querySelectorAll('.delete-btn.confirm').forEach(b => {
          b.classList.remove('confirm');
          b.textContent = 'delete';
        });
        pendingConfirm = id;
        el.classList.add('confirm');
        el.textContent = 'confirm?';
        return;
      }

      // Actually delete
      pendingConfirm = null;
      const sessionEl = el.closest('.session');
      sessionEl.classList.add('deleting');

      try {
        const res = await fetch(
          `${API}/api/session/${encodeURIComponent(project)}/${encodeURIComponent(id)}`,
          { method: 'DELETE' }
        );
        const data = await res.json();
        if (data.deleted) {
          sessions = sessions.filter(s => !(s.id === id && s.project === project));
          showToast('Session deleted');
          render();
        } else {
          showToast('Session not found', true);
          sessionEl.classList.remove('deleting');
        }
      } catch (err) {
        showToast('Delete failed', true);
        sessionEl.classList.remove('deleting');
      }
    }

    // ── Toast ──

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.className = 'toast', 2000);
    }

    // ── Resume session ──

    async function resumeSession(project, id, btnEl) {
      const session = sessions.find(s => s.id === id && s.project === project);
      const dir = session?.dir || project.replace(/^-/, '/').replace(/-/g, '/');
      const cmd = `cd ${dir} && claude --resume ${id}`;
      try {
        await navigator.clipboard.writeText(cmd);
        if (btnEl) {
          btnEl.classList.add('copied');
          btnEl.textContent = 'copied!';
          setTimeout(() => {
            btnEl.classList.remove('copied');
            btnEl.textContent = 'resume';
          }, 2000);
        }
        showToast('Command copied — paste in terminal');
      } catch {
        // Fallback: prompt
        prompt('Copy this command:', cmd);
      }
    }

    // ── Rename session ──

    async function renameSession(project, id, newName) {
      try {
        const res = await fetch(
          `${API}/api/session/${encodeURIComponent(project)}/${encodeURIComponent(id)}/name`,
          { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: newName }) }
        );
        if (!res.ok) throw new Error('Failed to rename');
        const session = sessions.find(s => s.id === id && s.project === project);
        if (session) session.customName = newName;
        showToast('Renamed');
        render();
        return true;
      } catch (err) {
        showToast('Rename failed', true);
        return false;
      }
    }

    async function clearSessionName(project, id) {
      try {
        await fetch(
          `${API}/api/session/${encodeURIComponent(project)}/${encodeURIComponent(id)}/name`,
          { method: 'DELETE' }
        );
        const session = sessions.find(s => s.id === id && s.project === project);
        if (session) delete session.customName;
        showToast('Name cleared');
        render();
      } catch {
        showToast('Failed to clear name', true);
      }
    }

    function startRename(project, id, currentName, containerEl) {
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'rename-input';
      input.value = currentName;
      input.placeholder = 'Enter a name...';

      containerEl.innerHTML = '';
      containerEl.appendChild(input);
      input.focus();
      input.select();

      const finish = async (save) => {
        input.removeEventListener('keydown', onKey);
        input.removeEventListener('blur', onBlur);
        if (save) {
          const name = input.value.trim();
          if (name && name !== currentName) {
            await renameSession(project, id, name);
          } else if (!name) {
            await clearSessionName(project, id);
          } else {
            render();
          }
        } else {
          render();
        }
      };

      const onKey = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); finish(true); }
        if (e.key === 'Escape') { e.preventDefault(); finish(false); }
      };

      const onBlur = () => finish(true);

      input.addEventListener('keydown', onKey);
      input.addEventListener('blur', onBlur);
    }

    // ── Detail view ──

    async function openDetail(project, id) {
      const overlay = document.getElementById('detailOverlay');
      const panel = document.getElementById('detailPanel');
      const info = document.getElementById('detailInfo');
      const msgContainer = document.getElementById('detailMessages');

      // Find session metadata
      const session = sessions.find(s => s.id === id && s.project === project);

      const titleEl = document.getElementById('detailTitle');
      const displayName = session?.customName || session?.firstMessage || 'No message';
      titleEl.innerHTML = `
        <span class="prompt-text ${session?.customName ? 'custom-name-label' : ''}">${escapeHtml(displayName)}</span>
        <button class="edit-name-btn" title="Rename">&#9998;</button>
      `;
      titleEl.querySelector('.edit-name-btn').onclick = (e) => {
        e.stopPropagation();
        startRename(project, id, session?.customName || session?.firstMessage || '', titleEl);
      };

      info.innerHTML = `
        <span class="project">${projectName(project)}</span>
        <span>${session ? formatTime(session.started) : ''}</span>
        <span>${session ? formatDuration(session.durationMinutes || 0) : ''}</span>
        <span>${session ? (session.messageCount || 0) + ' msgs' : ''}</span>
      `;

      msgContainer.innerHTML = '<div class="detail-loading"><div class="spinner"></div></div>';

      // Wire resume button for this session
      const resumeBtn = document.getElementById('resumeDetailBtn');
      resumeBtn.onclick = () => resumeSession(project, id, resumeBtn);

      overlay.classList.add('show');
      panel.classList.add('show');
      document.body.style.overflow = 'hidden';

      try {
        const res = await fetch(`${API}/api/session/${encodeURIComponent(project)}/${encodeURIComponent(id)}`);
        const messages = await res.json();

        if (messages.length === 0) {
          msgContainer.innerHTML = '<div class="detail-loading">No messages in this session.</div>';
          return;
        }

        msgContainer.innerHTML = messages.map(m => {
          const text = (m.text || '').trim();
          if (!text) return '';
          return `
            <div class="msg ${m.role}">
              <div class="msg-header">
                <span class="msg-role">${m.role === 'user' ? 'You' : 'Claude'}</span>
                ${m.timestamp ? `<span class="msg-time">${formatTime(m.timestamp)}</span>` : ''}
              </div>
              <div class="msg-text">${escapeHtml(text)}</div>
              ${m.toolCalls ? `
                <div class="tool-calls">
                  ${m.toolCalls.map(t => `<span class="tool-call">${escapeHtml(t.name)}</span>`).join('')}
                </div>
              ` : ''}
            </div>
          `;
        }).join('');

        msgContainer.scrollTop = 0;
      } catch (err) {
        msgContainer.innerHTML = '<div class="detail-loading">Failed to load conversation.</div>';
      }
    }

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('show');
      document.getElementById('detailPanel').classList.remove('show');
      document.body.style.overflow = '';
    }

    // Close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDetail();
    });

    // ── Controls ──

    document.querySelectorAll('.controls button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRange = btn.dataset.range;
        render();
      });
    });

    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase();
      render();
    });

    // Reset confirm on click outside
    document.addEventListener('click', e => {
      if (!e.target.classList.contains('delete-btn') && pendingConfirm) {
        pendingConfirm = null;
        document.querySelectorAll('.delete-btn.confirm').forEach(b => {
          b.classList.remove('confirm');
          b.textContent = 'delete';
        });
      }
    });

    // ── Rendering ──

    function filterByRange(sessions) {
      const now = new Date();
      return sessions.filter(s => {
        const diffDays = (now - new Date(s.started)) / 86400000;
        if (currentRange === 'week') return diffDays <= 7;
        if (currentRange === 'month') return diffDays <= 30;
        return true;
      });
    }

    function filterBySearch(sessions) {
      if (!searchQuery) return sessions;
      return sessions.filter(s =>
        (s.customName || '').toLowerCase().includes(searchQuery) ||
        (s.firstMessage || '').toLowerCase().includes(searchQuery) ||
        (s.project || '').toLowerCase().includes(searchQuery)
      );
    }

    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diff = Math.floor((now - d) / 86400000);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      if (diff < 7) return d.toLocaleDateString([], { weekday: 'long' });
      return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: now.getFullYear() !== d.getFullYear() ? 'numeric' : undefined });
    }

    function formatDuration(mins) {
      if (mins < 1) return '<1m';
      if (mins < 60) return `${Math.round(mins)}m`;
      const h = Math.floor(mins / 60);
      const m = Math.round(mins % 60);
      return `${h}h${m > 0 ? m + 'm' : ''}`;
    }

    function projectName(p) {
      return p
        .replace(/^-Users-[^-]+-code-/, '')
        .replace(/^-Users-[^-]+-/, '~/')
        .replace(/-/g, '/');
    }

    function render() {
      let filtered = filterByRange(sessions);
      filtered = filterBySearch(filtered);

      // Stats
      const totalSessions = filtered.length;
      const totalMessages = filtered.reduce((sum, s) => sum + (s.messageCount || 0), 0);
      const totalMinutes = filtered.reduce((sum, s) => sum + (s.durationMinutes || 0), 0);
      const projects = new Set(filtered.map(s => s.project)).size;

      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="label">Sessions</div><div class="value cyan">${totalSessions}</div></div>
        <div class="stat"><div class="label">Messages</div><div class="value green">${totalMessages}</div></div>
        <div class="stat"><div class="label">Time</div><div class="value yellow">${formatDuration(totalMinutes)}</div></div>
        <div class="stat"><div class="label">Projects</div><div class="value purple">${projects}</div></div>
      `;

      renderHeatmap(sessions);

      // Group by date
      const groups = {};
      filtered.sort((a, b) => new Date(b.started) - new Date(a.started));
      filtered.forEach(s => {
        const key = new Date(s.started).toDateString();
        if (!groups[key]) groups[key] = [];
        groups[key].push(s);
      });

      const content = document.getElementById('content');

      if (filtered.length === 0) {
        content.innerHTML = '<div class="empty-state">No sessions found for this period.</div>';
        return;
      }

      const maxDuration = Math.max(...filtered.map(s => s.durationMinutes || 0), 1);

      content.innerHTML = Object.entries(groups).map(([date, items]) => `
        <div class="day-group">
          <div class="day-header">
            ${formatDate(items[0].started)}
            <span class="count">${items.length}</span>
          </div>
          <div class="session-list">
            ${items.map(s => `
              <div class="session" data-id="${s.id}" data-project="${s.project}">
                <div class="session-main">
                  <div class="session-prompt" data-project="${s.project}" data-id="${s.id}">
                    <span class="prompt-text ${s.customName ? 'custom-name-label' : ''}">${escapeHtml(s.customName || s.firstMessage || 'No message')}</span>
                    <button class="edit-name-btn" data-action="rename" data-project="${s.project}" data-id="${s.id}" title="Rename">&#9998;</button>
                  </div>
                  <div class="session-meta">
                    <span class="project">${projectName(s.project)}</span>
                    <span class="time">${formatTime(s.started)}</span>
                    <span class="duration">${formatDuration(s.durationMinutes || 0)}</span>
                    <span class="msgs">${s.messageCount || 0} msgs</span>
                  </div>
                </div>
                <div class="session-right">
                  <div class="duration-bar">
                    <div class="fill" style="width: ${Math.max(5, ((s.durationMinutes || 0) / maxDuration) * 100)}%"></div>
                  </div>
                  <div class="session-actions">
                    <button class="action-btn resume" data-action="resume" data-project="${s.project}" data-id="${s.id}">resume</button>
                    <button class="action-btn delete" data-action="delete" data-project="${s.project}" data-id="${s.id}">delete</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderHeatmap(allSessions) {
      const container = document.getElementById('heatmap');
      const now = new Date();
      const days = 30;
      const counts = {};

      allSessions.forEach(s => {
        const key = new Date(s.started).toDateString();
        counts[key] = (counts[key] || 0) + 1;
      });

      let cells = '';
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const key = d.toDateString();
        const count = counts[key] || 0;
        const level = count === 0 ? '' : count <= 2 ? 'l1' : count <= 5 ? 'l2' : count <= 10 ? 'l3' : 'l4';
        const label = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        cells += `<div class="heatmap-cell ${level}" title="${label}: ${count} sessions"></div>`;
      }

      container.innerHTML = `
        <div class="heatmap-title">Last 30 days</div>
        <div class="heatmap-grid">${cells}</div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Event delegation for session clicks ──
    document.getElementById('content').addEventListener('click', e => {
      // Handle rename button
      const renameBtn = e.target.closest('[data-action="rename"]');
      if (renameBtn) {
        e.stopPropagation();
        const { project, id } = renameBtn.dataset;
        const session = sessions.find(s => s.id === id && s.project === project);
        const container = renameBtn.closest('.session-prompt');
        startRename(project, id, session?.customName || session?.firstMessage || '', container);
        return;
      }

      // Handle resume button
      const resumeBtn = e.target.closest('[data-action="resume"]');
      if (resumeBtn) {
        e.stopPropagation();
        const { project, id } = resumeBtn.dataset;
        resumeSession(project, id, resumeBtn);
        return;
      }

      // Handle delete button
      const deleteBtn = e.target.closest('[data-action="delete"]');
      if (deleteBtn) {
        e.stopPropagation();
        const { project, id } = deleteBtn.dataset;
        deleteSession(project, id, deleteBtn);
        return;
      }

      // Handle session click -> open detail
      const sessionEl = e.target.closest('.session[data-id]');
      if (sessionEl) {
        const { project, id } = sessionEl.dataset;
        openDetail(project, id);
      }
    });

    // ── Init ──
    loadSessions();
  </script>
</body>
</html>
